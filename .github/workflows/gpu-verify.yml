name: GPU Verify

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Verification suite to run through Ray GPU workers
        required: true
        default: focused
        type: choice
        options:
          - focused
          - distributed
          - both
      sync_to_worker:
        description: Stage the checked-out workflow tree into the Ray worker
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "0"

jobs:
  gpu-verify:
    name: Ray GPU verification
    runs-on:
      - self-hosted
      - rustrain-gpu
    timeout-minutes: 180
    env:
      RUSTRAIN_REMOTE_HOST: root@192.168.42.106
      RUSTRAIN_REMOTE_PORT: "2222"
      RUSTRAIN_REMOTE_DIR: /vePFS-Mindverse/user/nolanho/code/rustrain
      RUSTRAIN_REMOTE_PYTHON: /opt/venv/bin/python
      RUSTRAIN_RAY_ADDRESS: 192.168.42.141:6379
      RUSTRAIN_SYNC_TO_WORKER: ${{ inputs.sync_to_worker }}
      RUSTRAIN_SSH_OPTS: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/rustrain_gpu_known_hosts -o GlobalKnownHostsFile=/dev/null
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Focused GPU verification
        if: ${{ inputs.suite == 'focused' || inputs.suite == 'both' }}
        run: scripts/verify_gpu.sh

      - name: Distributed GPU verification
        if: ${{ inputs.suite == 'distributed' || inputs.suite == 'both' }}
        run: scripts/verify_gpu_distributed.sh
