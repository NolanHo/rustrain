[run]
name = "deepseek_v4_flash_lora_sft_ep8"
base_dir = "/tmp/rustrain-runs"
seed = 42

[model]
name = "deepseek_v4_flash_lora_sft_ep8"
architecture = "deepseek_v4_lora_sft_ep"
model_path = "/vePFS-mindverse/user/nolanho/models/DeepSeek-V4-Flash-Base"
