[run]
name = "qwen_session_single_sft_arrow_weighted"
base_dir = "/tmp/rustrain-runs"
seed = 777

[model]
name = "qwen2_5_0_5b_session_sft_arrow_weighted"
architecture = "qwen_trainable_session"
model_path = "/vePFS-Mindverse/share/huggingface/Qwen2.5-0.5B-Instruct"
vocab_size = 151936
hidden_size = 896
num_layers = 24
num_attention_heads = 14
num_key_value_heads = 2
intermediate_size = 4864
seq_len = 128
norm = "rmsnorm"
activation = "swiglu"
rope = true
rms_norm_eps = 0.000001
trainable_layers = [0]

[train]
max_steps = 2
backend = "tch"
micro_batch_size = 1
global_batch_size = 1
gradient_accumulation_steps = 1
learning_rate = 0.000001
weight_decay = 0.0
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 0.00000001
dtype = "fp32"
device = "cuda"
checkpoint_every = 0

[data]
kind = "instruction_arrow"
paths = [
  "/vePFS-Mindverse/share/huggingface/datasets/iamtarun___code_instructions_120k_alpaca/default/0.0.0/31f725b2d714c1b4f038e80fbaa6b977870a50b7/code_instructions_120k_alpaca-train.arrow",
  "/vePFS-Mindverse/share/huggingface/datasets/iamtarun___code_instructions_120k_alpaca/default/0.0.0/31f725b2d714c1b4f038e80fbaa6b977870a50b7/code_instructions_120k_alpaca-train.arrow",
]
source_weights = [2, 1]
source_max_samples = [8, 8]
max_samples = 24
train_split = 0.75
shuffle = false
instruction_field = "instruction"
input_field = "input"
response_field = "output"
prompt_template = "Instruction: {instruction}\nResponse: "
prompt_with_input_template = "Instruction: {instruction}\nInput: {input}\nResponse: "
field_truncations = [
  { field = "instruction", max_chars = 160 },
  { field = "input", max_chars = 160 },
  { field = "response", max_chars = 160 },
]

[parallel]
tensor_model_parallel_size = 1
pipeline_model_parallel_size = 1
data_parallel_size = 1
expert_model_parallel_size = 1
context_parallel_size = 1
