[run]
name = "sft_debug"
base_dir = "runs"
seed = 777

[model]
name = "sft_debug_qwen_like"
architecture = "qwen_like"
vocab_size = 128
hidden_size = 32
num_layers = 2
num_attention_heads = 4
num_key_value_heads = 2
intermediate_size = 64
seq_len = 128
norm = "rmsnorm"
activation = "swiglu"
rope = true
rms_norm_eps = 0.000001

[train]
max_steps = 30
backend = "nd_array"
micro_batch_size = 1
global_batch_size = 1
gradient_accumulation_steps = 2
learning_rate = 0.2
weight_decay = 0.0
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 0.00000001
dtype = "fp32"
device = "cpu"
checkpoint_every = 0
eval_every = 10

[data]
kind = "instruction_jsonl"
paths = ["data/sft_toy"]
train_split = 0.67

[parallel]
tensor_model_parallel_size = 1
pipeline_model_parallel_size = 1
data_parallel_size = 1
expert_model_parallel_size = 1
context_parallel_size = 1
