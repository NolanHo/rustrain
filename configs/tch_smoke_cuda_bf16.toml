[run]
name = "tch_smoke_cuda_bf16"
base_dir = "/tmp/rustrain-runs"
seed = 42

[model]
name = "tch_smoke_model"
architecture = "tch_tiny_lm"
vocab_size = 16
hidden_size = 8
num_layers = 1
num_attention_heads = 2
num_key_value_heads = 1
intermediate_size = 16
seq_len = 8
norm = "rmsnorm"
activation = "swiglu"
rope = true
rms_norm_eps = 0.000001

[train]
max_steps = 3
backend = "tch"
micro_batch_size = 1
global_batch_size = 1
gradient_accumulation_steps = 1
learning_rate = 0.01
weight_decay = 0.0
adam_beta1 = 0.9
adam_beta2 = 0.999
adam_eps = 0.00000001
dtype = "bf16"
device = "cuda"
checkpoint_every = 0

[parallel]
tensor_model_parallel_size = 1
pipeline_model_parallel_size = 1
data_parallel_size = 1
expert_model_parallel_size = 1
context_parallel_size = 1
